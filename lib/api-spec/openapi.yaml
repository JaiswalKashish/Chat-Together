openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: ChaloTogether API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: colleges
  - name: communities
  - name: verification
  - name: events
  - name: rides
  - name: bookings
  - name: dashboard
  - name: chat
  - name: trusted-contacts
  - name: tracking

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Auth ───────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegistration"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailVerification"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResult"
        "400":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/resend-verification:
    post:
      operationId: resendVerification
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationInput"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/send-phone-otp:
    post:
      operationId: sendPhoneOtp
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhoneInput"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/verify-phone:
    post:
      operationId: verifyPhone
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhoneVerification"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResult"
        "400":
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Users ──────────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMyProfile
      tags: [users]
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMyProfile
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/{id}/profile:
    get:
      operationId: getUserProfile
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Public profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicUserProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Verification ───────────────────────────────────────────────────────────
  /verification/student-id:
    post:
      operationId: submitStudentId
      tags: [verification]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentIdInput"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentVerification"
        "400":
          description: Mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /verification/status:
    get:
      operationId: getVerificationStatus
      tags: [verification]
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentVerification"

  # ─── Colleges ───────────────────────────────────────────────────────────────
  /colleges:
    get:
      operationId: listColleges
      tags: [colleges]
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/College"

  # ─── Communities ────────────────────────────────────────────────────────────
  /communities:
    get:
      operationId: listMyCommunities
      tags: [communities]
      responses:
        "200":
          description: My communities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Community"

  /communities/all:
    get:
      operationId: listAllCommunities
      tags: [communities]
      responses:
        "200":
          description: All communities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Community"

  /communities/{id}:
    get:
      operationId: getCommunity
      tags: [communities]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Community detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /communities/{id}/members:
    get:
      operationId: getCommunityMembers
      tags: [communities]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityMember"

  /communities/{id}/join:
    post:
      operationId: joinCommunity
      tags: [communities]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Not verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /communities/{id}/leave:
    post:
      operationId: leaveCommunity
      tags: [communities]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Left
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ─── Events ─────────────────────────────────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      tags: [events]
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

  # ─── Rides ──────────────────────────────────────────────────────────────────
  /rides/create:
    post:
      operationId: createRide
      tags: [rides]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RideInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RideDetail"
        "400":
          description: Invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rides/search:
    get:
      operationId: searchRides
      tags: [rides]
      parameters:
        - name: origin
          in: query
          schema:
            type: string
        - name: destination
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
        - name: time
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Matching rides with scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RideSearchResult"

  /rides/my:
    get:
      operationId: getMyRides
      tags: [rides]
      responses:
        "200":
          description: My rides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyRides"

  /rides/{id}:
    get:
      operationId: getRide
      tags: [rides]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ride detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RideDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rides/{id}/book:
    post:
      operationId: bookRide
      tags: [rides]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Booking requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rides/{id}/bookings:
    get:
      operationId: getRideBookings
      tags: [rides]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking requests for driver
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookingWithPassenger"

  /rides/{id}/cancel:
    post:
      operationId: cancelRide
      tags: [rides]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /rides/{id}/location:
    post:
      operationId: updateRideLocation
      tags: [rides]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ─── Bookings ────────────────────────────────────────────────────────────────
  /bookings/{id}/accept:
    post:
      operationId: acceptBooking
      tags: [bookings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/reject:
    post:
      operationId: rejectBooking
      tags: [bookings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /bookings/{id}/verify-otp:
    post:
      operationId: verifyRideOtp
      tags: [bookings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpInput"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/complete:
    post:
      operationId: completeBooking
      tags: [bookings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ─── Chat ────────────────────────────────────────────────────────────────────
  /chat/conversations:
    get:
      operationId: getConversations
      tags: [chat]
      responses:
        "200":
          description: Conversations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /chat/messages:
    get:
      operationId: getMessages
      tags: [chat]
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /chat/send:
    post:
      operationId: sendMessage
      tags: [chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /chat/read:
    post:
      operationId: markMessagesRead
      tags: [chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkReadInput"
      responses:
        "200":
          description: Marked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ─── Trusted Contacts ────────────────────────────────────────────────────────
  /trusted-contacts:
    get:
      operationId: listTrustedContacts
      tags: [trusted-contacts]
      responses:
        "200":
          description: Contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrustedContact"
    post:
      operationId: addTrustedContact
      tags: [trusted-contacts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrustedContactInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustedContact"

  /trusted-contacts/{id}:
    delete:
      operationId: deleteTrustedContact
      tags: [trusted-contacts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ─── Tracking ────────────────────────────────────────────────────────────────
  /trips/{token}:
    get:
      operationId: getPublicTrip
      tags: [tracking]
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public trip info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicTrip"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Dashboard ───────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        demoToken:
          type: ["string", "null"]
        demoOtp:
          type: ["string", "null"]

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, fullName, email, phone, college, department, year, emailVerified, phoneVerified, studentIdVerified, isVerified, createdAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        college:
          type: string
        department:
          type: string
        year:
          type: string
        profilePhotoUrl:
          type: ["string", "null"]
        emailVerified:
          type: boolean
        phoneVerified:
          type: boolean
        studentIdVerified:
          type: boolean
        isVerified:
          type: boolean
        createdAt:
          type: string

    UserProfile:
      type: object
      required: [id, fullName, email, phone, college, department, year, emailVerified, phoneVerified, studentIdVerified, isVerified, createdAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        college:
          type: string
        department:
          type: string
        year:
          type: string
        profilePhotoUrl:
          type: ["string", "null"]
        emailVerified:
          type: boolean
        phoneVerified:
          type: boolean
        studentIdVerified:
          type: boolean
        isVerified:
          type: boolean
        reliabilityScore:
          type: integer
        createdAt:
          type: string

    PublicUserProfile:
      type: object
      required: [id, fullName, college, department, year, isVerified, reliabilityScore, createdAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        college:
          type: string
        department:
          type: string
        year:
          type: string
        profilePhotoUrl:
          type: ["string", "null"]
        isVerified:
          type: boolean
        reliabilityScore:
          type: integer
        totalRides:
          type: integer
        createdAt:
          type: string

    UserRegistration:
      type: object
      required: [fullName, college, department, year, email, phone, password]
      properties:
        fullName:
          type: string
          minLength: 2
        college:
          type: string
        department:
          type: string
        year:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
          minLength: 8

    LoginInput:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: Email or phone number
        password:
          type: string

    UserProfileUpdate:
      type: object
      properties:
        fullName:
          type: string
        department:
          type: string
        year:
          type: string
        profilePhotoUrl:
          type: ["string", "null"]

    EmailVerification:
      type: object
      required: [token]
      properties:
        token:
          type: string

    ResendVerificationInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    PhoneInput:
      type: object
      required: [phone]
      properties:
        phone:
          type: string

    PhoneVerification:
      type: object
      required: [phone, otp]
      properties:
        phone:
          type: string
        otp:
          type: string

    VerificationResult:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string

    StudentIdInput:
      type: object
      required: [studentIdImageUrl, college]
      properties:
        studentIdImageUrl:
          type: string
        college:
          type: string

    StudentVerification:
      type: object
      required: [id, userId, status, studentIdImageUrl, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        status:
          type: string
          enum: [pending, verified, rejected]
        studentIdImageUrl:
          type: string
        extractedName:
          type: ["string", "null"]
        extractedRollNumber:
          type: ["string", "null"]
        extractedCollege:
          type: ["string", "null"]
        rejectionReason:
          type: ["string", "null"]
        createdAt:
          type: string

    College:
      type: object
      required: [id, name, shortName, location, isActive]
      properties:
        id:
          type: integer
        name:
          type: string
        shortName:
          type: string
        location:
          type: string
        isActive:
          type: boolean
        studentCount:
          type: integer

    Community:
      type: object
      required: [id, name, collegeId, collegeName, memberCount, isJoined, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        collegeId:
          type: integer
        collegeName:
          type: string
        description:
          type: ["string", "null"]
        memberCount:
          type: integer
        isJoined:
          type: boolean
        createdAt:
          type: string

    CommunityDetail:
      type: object
      required: [id, name, collegeId, collegeName, memberCount, isJoined, activeMembers, upcomingEvents, communityRides, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        collegeId:
          type: integer
        collegeName:
          type: string
        description:
          type: ["string", "null"]
        memberCount:
          type: integer
        activeMembers:
          type: integer
        upcomingEvents:
          type: integer
