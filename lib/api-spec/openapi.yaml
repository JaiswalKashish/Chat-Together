openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ChaloTogether API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User operations
  - name: colleges
    description: College operations
  - name: communities
    description: Community operations
  - name: verification
    description: Student verification operations
  - name: events
    description: Events operations
  - name: rides
    description: Rides operations
  - name: dashboard
    description: Dashboard operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegistration"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login with email or phone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Logout current user
      responses:
        "204":
          description: Logged out successfully

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      summary: Verify email with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailVerification"
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResult"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/resend-verification:
    post:
      operationId: resendVerification
      tags: [auth]
      summary: Resend email verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationInput"
      responses:
        "200":
          description: Verification email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/send-phone-otp:
    post:
      operationId: sendPhoneOtp
      tags: [auth]
      summary: Send OTP to phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhoneInput"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/verify-phone:
    post:
      operationId: verifyPhone
      tags: [auth]
      summary: Verify phone with OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhoneVerification"
      responses:
        "200":
          description: Phone verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResult"
        "400":
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me:
    get:
      operationId: getMyProfile
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateMyProfile
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /verification/student-id:
    post:
      operationId: submitStudentId
      tags: [verification]
      summary: Submit student ID for verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentIdInput"
      responses:
        "200":
          description: Student ID submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentVerification"
        "400":
          description: College mismatch or invalid ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /verification/status:
    get:
      operationId: getVerificationStatus
      tags: [verification]
      summary: Get current user verification status
      responses:
        "200":
          description: Verification status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentVerification"

  /colleges:
    get:
      operationId: listColleges
      tags: [colleges]
      summary: List all supported colleges
      responses:
        "200":
          description: List of colleges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/College"

  /communities:
    get:
      operationId: listMyCommunities
      tags: [communities]
      summary: List communities the current user has joined
      responses:
        "200":
          description: User's communities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Community"

  /communities/all:
    get:
      operationId: listAllCommunities
      tags: [communities]
      summary: List all available communities
      responses:
        "200":
          description: All communities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Community"

  /communities/{id}/join:
    post:
      operationId: joinCommunity
      tags: [communities]
      summary: Join a community
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Joined community
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Not verified to join
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /communities/{id}/leave:
    post:
      operationId: leaveCommunity
      tags: [communities]
      summary: Leave a community
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Left community
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events
      responses:
        "200":
          description: Events list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

  /rides:
    get:
      operationId: listRides
      tags: [rides]
      summary: List rides
      responses:
        "200":
          description: Rides list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ride"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, fullName, email, phone, college, department, year, emailVerified, phoneVerified, studentIdVerified, isVerified, createdAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        college:
          type: string
        department:
          type: string
        year:
          type: string
        profilePhotoUrl:
          type: ["string", "null"]
        emailVerified:
          type: boolean
        phoneVerified:
          type: boolean
        studentIdVerified:
          type: boolean
        isVerified:
          type: boolean
        createdAt:
          type: string

    UserProfile:
      type: object
      required: [id, fullName, email, phone, college, department, year, emailVerified, phoneVerified, studentIdVerified, isVerified, createdAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        college:
          type: string
        department:
          type: string
        year:
          type: string
        profilePhotoUrl:
          type: ["string", "null"]
        emailVerified:
          type: boolean
        phoneVerified:
          type: boolean
        studentIdVerified:
          type: boolean
        isVerified:
          type: boolean
        createdAt:
          type: string

    UserRegistration:
      type: object
      required: [fullName, college, department, year, email, phone, password]
      properties:
        fullName:
          type: string
          minLength: 2
        college:
          type: string
        department:
          type: string
        year:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
          minLength: 8

    LoginInput:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: Email or phone number
        password:
          type: string

    UserProfileUpdate:
      type: object
      properties:
        fullName:
          type: string
        department:
          type: string
        year:
          type: string
        profilePhotoUrl:
          type: ["string", "null"]

    EmailVerification:
      type: object
      required: [token]
      properties:
        token:
          type: string

    ResendVerificationInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    PhoneInput:
      type: object
      required: [phone]
      properties:
        phone:
          type: string

    PhoneVerification:
      type: object
      required: [phone, otp]
      properties:
        phone:
          type: string
        otp:
          type: string

    VerificationResult:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string

    StudentIdInput:
      type: object
      required: [studentIdImageUrl, college]
      properties:
        studentIdImageUrl:
          type: string
        college:
          type: string

    StudentVerification:
      type: object
      required: [id, userId, status, studentIdImageUrl, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        status:
          type: string
          enum: [pending, verified, rejected]
        studentIdImageUrl:
          type: string
        extractedName:
          type: ["string", "null"]
        extractedRollNumber:
          type: ["string", "null"]
        extractedCollege:
          type: ["string", "null"]
        rejectionReason:
          type: ["string", "null"]
        createdAt:
          type: string

    College:
      type: object
      required: [id, name, shortName, location, isActive]
      properties:
        id:
          type: integer
        name:
          type: string
        shortName:
          type: string
        location:
          type: string
        isActive:
          type: boolean
        studentCount:
          type: integer

    Community:
      type: object
      required: [id, name, collegeId, collegeName, memberCount, isJoined, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        collegeId:
          type: integer
        collegeName:
          type: string
        description:
          type: ["string", "null"]
        memberCount:
          type: integer
        isJoined:
          type: boolean
        createdAt:
          type: string

    Event:
      type: object
      required: [id, title, type, date, collegeId, collegeName, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        type:
          type: string
          enum: [exam, placement, workshop, hackathon, fest, other]
        date:
          type: string
        venue:
          type: ["string", "null"]
        collegeId:
          type: integer
        collegeName:
          type: string
        ridePoolCount:
          type: integer
        createdAt:
          type: string

    Ride:
      type: object
      required: [id, offererId, status, origin, destination, date, seatsAvailable, createdAt]
      properties:
        id:
          type: integer
        offererId:
          type: integer
        offererName:
          type: string
        status:
          type: string
          enum: [active, full, completed, cancelled]
        origin:
          type: string
        destination:
          type: string
        date:
          type: string
        seatsAvailable:
          type: integer
        eventId:
          type: ["integer", "null"]
        createdAt:
          type: string

    DashboardSummary:
      type: object
      required: [communitiesJoined, upcomingEvents, activeRides, verificationStatus]
      properties:
        communitiesJoined:
          type: integer
        upcomingEvents:
          type: integer
        activeRides:
          type: integer
        verificationStatus:
          type: string
          enum: [incomplete, pending, verified]
        totalCommunityMembers:
          type: integer
